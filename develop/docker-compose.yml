services:

  nginx:
    container_name: moto-rental_nginx
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - "./configs/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro"
    depends_on:
      - frontend
      - backend
    networks:
      moto_network:
        ipv4_address: 10.10.0.2

  frontend:
    container_name: moto-rental_frontend
    build:
      context: ../
      dockerfile: dockerfiles/frontend/Dockerfile
    volumes:
      - "../frontend:/app:rw"
      - "/app/node_modules"
    networks:
      moto_network:
        ipv4_address: 10.10.0.3

  backend:
    container_name: moto-rental_backend
    build:
      context: ../
      dockerfile: dockerfiles/backend/Dockerfile
      target: dev
    volumes:
      - "../backend:/app:rw"
      - "../_db:/data"
      - "/run/systemd/resolve/resolv.conf:/etc/resolv.conf:ro"
    env_file:
      - "../.env"
    networks:
      moto_network:
        ipv4_address: 10.10.0.4

networks:
  moto_network:
    ipam:
      driver: default
      config:
        - subnet: 10.10.0.0/24


x-logging: &logging
  logging:
    options:
      max-size: "10m"
      max-file: "3"

x-environment: &env
  environment:
    - TZ=Asia/Krasnoyarsk

services:

  node-builder:
    container_name: moto-rental_node-builder
    image: node:20-alpine
    working_dir: /app
    volumes:
      - "../frontend:/app"
      - "frontend_dist:/build"
    command: sh -c "npm ci && npm run build && cp -r dist/* /build/"
    <<: *logging

  web:
    container_name: moto-rental_web
    image: nginx:alpine
    <<: [*logging, *env]
    env_file:
      - "../.env"
    command:
      - sh
      - -c
      - |
        apk add --no-cache apache2-utils -q
        htpasswd -bn "$$DB_ADMIN_USER" "$$DB_ADMIN_PASSWORD" > /etc/nginx/.htpasswd
        exec nginx -g 'daemon off;'
    ports:
      - "127.0.0.1:8888:80"
    volumes:
      - "frontend_dist:/var/www/html:ro"
      - "./configs/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro"
    restart: always
    depends_on:
      node-builder:
        condition: service_completed_successfully
      backend:
        condition: service_started
      sqlite-web:
        condition: service_started
    networks:
      moto_network:
        ipv4_address: 10.10.0.2

  backend:
    container_name: moto-rental_backend
    build:
      context: ../
      dockerfile: dockerfiles/backend/Dockerfile
      target: prod
    <<: [*logging, *env]
    env_file:
      - "../.env"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "../_db:/data"
    restart: always
    networks:
      moto_network:
        ipv4_address: 10.10.0.3

  sqlite-web:
    container_name: moto-rental_sqlite-web
    image: coleifer/sqlite-web
    command: sqlite_web -H 0.0.0.0 -p 8080 -u /database /data/bookings.db
    <<: [*logging, *env]
    volumes:
      - "../_db:/data"
    restart: always
    depends_on:
      backend:
        condition: service_started
    networks:
      moto_network:
        ipv4_address: 10.10.0.4

networks:
  moto_network:
    ipam:
      driver: default
      config:
        - subnet: 10.10.0.0/24

volumes:
  frontend_dist:

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#19140E"/>
  <!-- rear wheel -->
  <circle cx="8" cy="22" r="6" fill="none" stroke="#F7F2EC" stroke-width="2"/>
  <circle cx="8" cy="22" r="2" fill="#F7F2EC"/>
  <!-- front wheel -->
  <circle cx="25" cy="22" r="5" fill="none" stroke="#F7F2EC" stroke-width="2"/>
  <circle cx="25" cy="22" r="1.5" fill="#F7F2EC"/>
  <!-- frame -->
  <polyline points="8,22 11,15 16,14 20,16 25,17" fill="none" stroke="#F7F2EC" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- seat/tank -->
  <polyline points="11,15 14,10 18,10 20,13 20,16" fill="none" stroke="#F7F2EC" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- fork -->
  <line x1="25" y1="17" x2="25" y2="22" stroke="#F7F2EC" stroke-width="1.8" stroke-linecap="round"/>
  <!-- handlebar -->
  <line x1="22" y1="11" x2="26" y2="12" stroke="#F7F2EC" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="23" y1="13" x2="25" y2="16" stroke="#F7F2EC" stroke-width="1.5" stroke-linecap="round"/>
</svg>

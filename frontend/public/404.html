<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Страница не найдена | ALTAI MOTO</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --ink:#19140E; --cream:#F7F2EC;
      --mid:#7A6B5E; --rust:#C04E18;
      --teal:#0D8A85; --teall:#0FA89F;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{
      background:var(--ink);
      color:var(--cream);
      font-family:'Barlow',sans-serif;
      min-height:100svh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:2rem;
      position:relative;
      overflow:hidden;
    }
    .bc{font-family:'Barlow Condensed',sans-serif;}
    .lbl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.625rem;letter-spacing:.25em;text-transform:uppercase;}
    .bg-photo{position:absolute;inset:0;background-image:url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=60');background-size:cover;background-position:center 40%;opacity:.1;}
    .bg-gradient{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 60%,rgba(13,138,133,.12) 0%,transparent 65%);}
    .num{
      position:absolute;
      font-family:'Barlow Condensed',sans-serif;
      font-weight:800;
      font-size:clamp(10rem,30vw,18rem);
      line-height:1;
      color:rgba(247,242,236,.04);
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      pointer-events:none;
      user-select:none;
      white-space:nowrap;
    }
    .content{position:relative;max-width:520px;}
    .btn{
      display:inline-block;
      background:var(--teal);
      color:#fff;
      font-family:'Barlow Condensed',sans-serif;
      font-weight:700;
      font-size:.875rem;
      letter-spacing:.1em;
      text-transform:uppercase;
      padding:.9rem 2.5rem;
      text-decoration:none;
      transition:background .15s;
    }
    .btn:hover{background:var(--teall);}
    .home-link{
      position:absolute;
      top:1.5rem;
      left:1.5rem;
      font-family:'Barlow Condensed',sans-serif;
      font-weight:800;
      font-size:1.125rem;
      letter-spacing:.15em;
      color:#F7F2EC;
      text-decoration:none;
      text-transform:uppercase;
      opacity:.6;
      transition:opacity .15s;
    }
    .home-link:hover{opacity:1;}
  </style>
</head>
<body>
  <a href="/" class="home-link">ALTAI MOTO</a>
  <div class="bg-photo"></div>
  <div class="bg-gradient"></div>
  <div class="num">404</div>

  <div class="content">
    <p class="lbl" style="color:var(--teal);margin-bottom:1.5rem;">Ошибка 404</p>
    <h1 class="bc" style="font-size:clamp(2.5rem,8vw,4.5rem);font-weight:800;text-transform:uppercase;line-height:1;margin-bottom:1.25rem;">Страница<br/>не найдена</h1>
    <p style="color:rgba(247,242,236,.4);font-size:.9375rem;line-height:1.7;margin-bottom:2.5rem;">Возможно, вы перешли по неверной ссылке<br/>или страница была удалена.<br/><br/>Но горные дороги Алтая всё ещё ждут вас.</p>
    <a href="/" class="btn">На главную</a>
  </div>
</body>
</html>

root = "."
tmp_dir = "tmp"

[build]
  cmd     = "go build -o ./tmp/server ./cmd/server"
  bin     = "./tmp/server"
  include_ext = ["go", "toml"]
  exclude_dir = ["tmp"]
  delay   = 500

[log]
  time = true

[color]
  main    = "magenta"
  watcher = "cyan"
  build   = "yellow"
  runner  = "green"

[misc]
  clean_on_exit = true
